<!DOCTYPE html>
<html>
<head>
    <title>Editar Cliente</title>
</head>

<body style="font-family: Arial; background-color: #f5f6fa; margin: 0;">

<div style="max-width: 600px; margin: 60px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1);">

    <h2>✏️ Editar Cliente</h2>

    <form method="POST" action="/atualizar/{{ cliente[0] }}">

        <label>Nome</label><br>
        <input type="text" name="nome" value="{{ cliente[1] }}" style="width: 100%; padding: 10px; margin-bottom: 15px;">

        <label>Telefone</label><br>
        <input type="text" name="telefone" value="{{ cliente[2] }}" style="width: 100%; padding: 10px; margin-bottom: 15px;">

        <label>Interesse</label><br>
        <input type="text" name="interesse" value="{{ cliente[3] }}" style="width: 100%; padding: 10px; margin-bottom: 15px;">

        <label>Status</label><br>
        <select name="status" style="width: 100%; padding: 10px; margin-bottom: 20px;">
            <option {% if cliente[4] == 'Lead' %}selected{% endif %}>Lead</option>
            <option {% if cliente[4] == 'Negociação' %}selected{% endif %}>Negociação</option>
            <option {% if cliente[4] == 'Fechado' %}selected{% endif %}>Fechado</option>
            <option {% if cliente[4] == 'Perdido' %}selected{% endif %}>Perdido</option>
        </select>

        <button type="submit" style="width: 100%; background: #2c3e50; color: white; padding: 12px; border: none; border-radius: 5px;">
            Salvar Alterações
        </button>

    </form>

    <br>
    <a href="/clientes">⬅ Voltar</a>

</div>
